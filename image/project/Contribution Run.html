<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contribution Run — manik3160</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg-0:#05100c;
    --bg-1:#081a13;
    --panel:#0a1f17;
    --panel-edge:#14352a;
    --ink:#e8fff2;
    --ink-dim:#7fae98;
    --ink-faint:#4d7d68;
    --torch:#ffb347;

    --l0:#102019;
    --l1:#1d6f45;
    --l2:#2bbf6a;
    --l3:#74e36b;
    --l4:#dcf86a;

    --cell:13px;
    --gap:4px;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 700px at 50% -10%, #0d2a1f 0%, transparent 60%),
      radial-gradient(900px 900px at 110% 120%, #0a241a 0%, transparent 55%),
      linear-gradient(160deg, var(--bg-1), var(--bg-0));
    color:var(--ink);
    font-family:"JetBrains Mono", ui-monospace, monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
  }

  /* ----- card ----- */
  .card{
    position:relative;
    width:min(1040px, 100%);
    background:
      linear-gradient(180deg, rgba(20,53,42,.35), rgba(10,31,23,.55));
    border:1px solid var(--panel-edge);
    border-radius:20px;
    padding:30px 34px 26px;
    box-shadow:
      0 1px 0 rgba(120,227,107,.07) inset,
      0 40px 90px -50px rgba(0,0,0,.9),
      0 0 0 1px rgba(0,0,0,.3);
    overflow:hidden;
  }
  .card::before{
    /* faint vine glow top-left */
    content:"";
    position:absolute; inset:0;
    background:radial-gradient(420px 220px at 0% 0%, rgba(116,227,107,.10), transparent 60%);
    pointer-events:none;
  }

  /* ----- header ----- */
  header{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:24px; flex-wrap:wrap; margin-bottom:22px; position:relative; z-index:2;
  }
  .kicker{
    font-size:11px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--ink-faint); display:flex; align-items:center; gap:9px; margin:0 0 8px;
  }
  .kicker .dot{
    width:7px; height:7px; border-radius:50%; background:var(--l3);
    box-shadow:0 0 10px var(--l3); animation:pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:.35; } 50%{ opacity:1; } }
  h1{
    font-family:"Space Grotesk", sans-serif;
    font-weight:700; font-size:34px; line-height:1; margin:0;
    letter-spacing:-.01em; color:var(--ink);
  }
  h1 .run{ color:var(--torch); text-shadow:0 0 22px rgba(255,179,71,.45); }
  .sub{ margin:9px 0 0; font-size:13px; color:var(--ink-dim); }
  .sub a{ color:var(--l3); text-decoration:none; }

  .stat{ text-align:right; }
  .stat .num{
    font-family:"Space Grotesk", sans-serif; font-weight:700;
    font-size:30px; line-height:1; color:var(--ink);
  }
  .stat .lbl{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); margin-top:6px; }

  /* ----- graph ----- */
  .graph-wrap{ position:relative; z-index:2; }
  .scroller{ overflow-x:auto; overflow-y:hidden; padding-bottom:6px; }
  .scroller::-webkit-scrollbar{ height:8px; }
  .scroller::-webkit-scrollbar-thumb{ background:var(--panel-edge); border-radius:8px; }

  .graph-inner{ display:inline-grid; grid-template-columns:auto 1fr; grid-template-rows:auto auto; column-gap:8px; row-gap:6px; }
  .months{ grid-column:2; grid-row:1; position:relative; height:14px; }
  .months span{
    position:absolute; top:0; font-size:11px; color:var(--ink-faint);
    transform:translateX(-1px); white-space:nowrap;
  }
  .days{ grid-column:1; grid-row:2; display:grid; grid-auto-rows:calc(var(--cell) + var(--gap)); align-content:start; }
  .days span{ font-size:10px; color:var(--ink-faint); height:var(--cell); line-height:var(--cell); }

  .stage{ grid-column:2; grid-row:2; position:relative; }
  .grid{ display:flex; gap:var(--gap); }
  .col{ display:flex; flex-direction:column; gap:var(--gap); }
  .cell{
    width:var(--cell); height:var(--cell); border-radius:3px;
    background:var(--l0);
    transition:background .3s ease, box-shadow .3s ease, opacity .35s ease, transform .35s cubic-bezier(.2,1.4,.4,1);
  }
  .cell.pad{ visibility:hidden; }
  .cell.l1{ background:var(--l1); box-shadow:0 0 5px -1px var(--l1); }
  .cell.l2{ background:var(--l2); box-shadow:0 0 7px -1px var(--l2); }
  .cell.l3{ background:var(--l3); box-shadow:0 0 9px 0 var(--l3); }
  .cell.l4{ background:var(--l4); box-shadow:0 0 13px 1px var(--l4); }
  .cell.eaten{ background:var(--l0)!important; box-shadow:none!important; opacity:.18; transform:scale(.5); }

  canvas.fx, canvas.bg{ position:absolute; left:0; pointer-events:none; }
  canvas.bg{ inset:0; width:100%; height:100%; z-index:1; }
  canvas.fx{ top:-6px; z-index:5; }

  /* ----- legend ----- */
  .legend{
    display:flex; align-items:center; gap:8px; justify-content:flex-end;
    margin-top:16px; font-size:11px; color:var(--ink-faint); position:relative; z-index:2;
  }
  .legend .swatch{ width:12px; height:12px; border-radius:3px; }

  .tip{
    position:fixed; z-index:50; pointer-events:none; opacity:0;
    transform:translate(-50%,-100%) translateY(-10px);
    background:#04140e; border:1px solid var(--panel-edge);
    padding:7px 10px; border-radius:8px; font-size:12px; color:var(--ink);
    box-shadow:0 12px 30px -12px rgba(0,0,0,.8); white-space:nowrap;
    transition:opacity .12s ease;
  }
  .tip b{ color:var(--l3); }
  .tip::after{
    content:""; position:absolute; left:50%; bottom:-5px; width:9px; height:9px;
    background:#04140e; border-right:1px solid var(--panel-edge); border-bottom:1px solid var(--panel-edge);
    transform:translateX(-50%) rotate(45deg);
  }

  footer{ margin-top:18px; font-size:11px; color:var(--ink-faint); position:relative; z-index:2; }
  footer .err{ color:#e0a14b; }
</style>
</head>
<body>
  <main class="card">
    <header>
      <div>
        <p class="kicker"><span class="dot"></span> GitHub · Live contributions</p>
        <h1>Contribution <span class="run">Run</span></h1>
        <p class="sub">A torch-bearing runner sprints the grid, collecting each day. <a href="https://github.com/manik3160" target="_blank" rel="noopener">@manik3160</a></p>
      </div>
      <div class="stat">
        <div class="num" id="total">—</div>
        <div class="lbl">contributions / yr</div>
      </div>
    </header>

    <div class="graph-wrap">
      <div class="scroller">
        <div class="graph-inner">
          <div class="months" id="months"></div>
          <div class="days" id="days"></div>
          <div class="stage" id="stage">
            <canvas class="bg" id="bg"></canvas>
            <div class="grid" id="grid"></div>
            <canvas class="fx" id="fx"></canvas>
          </div>
        </div>
      </div>

      <div class="legend">
        <span>Less</span>
        <span class="swatch" style="background:var(--l0)"></span>
        <span class="swatch" style="background:var(--l1)"></span>
        <span class="swatch" style="background:var(--l2)"></span>
        <span class="swatch" style="background:var(--l3)"></span>
        <span class="swatch" style="background:var(--l4)"></span>
        <span>More</span>
      </div>
    </div>

    <footer id="foot">Pulling live data…</footer>
  </main>

  <div class="tip" id="tip"></div>

<script>
(function(){
  "use strict";
  const USER = "manik3160";
  const CELL = 13, GAP = 4, PITCH = CELL + GAP, ROWS = 7;
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const gridEl = document.getElementById("grid");
  const monthsEl = document.getElementById("months");
  const daysEl = document.getElementById("days");
  const stage = document.getElementById("stage");
  const bg = document.getElementById("bg");
  const fx = document.getElementById("fx");
  const tip = document.getElementById("tip");
  const totalEl = document.getElementById("total");
  const foot = document.getElementById("foot");
  const bx = bg.getContext("2d");
  const fxc = fx.getContext("2d");

  // ---------- data ----------
  function levelFromCount(c){
    if(c<=0) return 0; if(c<=2) return 1; if(c<=5) return 2; if(c<=9) return 3; return 4;
  }
  function fallbackDays(){
    const out=[]; const today=new Date(); today.setHours(0,0,0,0);
    for(let i=370;i>=0;i--){
      const d=new Date(today); d.setDate(today.getDate()-i);
      const wd=d.getDay();
      // weave a plausible developer rhythm: weekdays busier, occasional bursts
      let base = wd===0||wd===6 ? 0.25 : 0.7;
      let c = Math.random()<base ? Math.floor(Math.pow(Math.random(),1.7)*13) : 0;
      if(Math.random()<0.03) c += Math.floor(Math.random()*14);
      out.push({ date:d.toISOString().slice(0,10), count:c, level:levelFromCount(c) });
    }
    return out;
  }
  async function loadDays(){
    try{
      const r = await fetch(`https://github-contributions-api.jogruber.de/v4/${USER}?y=last`, {cache:"no-store"});
      if(!r.ok) throw new Error("status "+r.status);
      const j = await r.json();
      if(!j.contributions || !j.contributions.length) throw new Error("empty");
      return { days:j.contributions.map(c=>({date:c.date,count:c.count,level:c.level})), live:true };
    }catch(e){
      return { days:fallbackDays(), live:false, err:e.message };
    }
  }

  // ---------- build columns ----------
  function buildColumns(days){
    days = days.slice().sort((a,b)=>a.date<b.date?-1:1);
    const cols=[]; let col=new Array(ROWS).fill(null);
    days.forEach((d,i)=>{
      const wd = new Date(d.date+"T00:00:00").getDay();
      if(i===0){ for(let r=0;r<wd;r++) col[r]={pad:true}; }
      col[wd]=d;
      if(wd===6){ cols.push(col); col=new Array(ROWS).fill(null); }
    });
    if(col.some(x=>x!==null)) cols.push(col);
    return cols.slice(-53);
  }

  let COLS=[], colEls=[], collected=[], gridW=0, gridH=0;

  function render(days){
    COLS = buildColumns(days);
    gridEl.innerHTML=""; colEls=[]; collected=[];
    COLS.forEach((col)=>{
      const cdiv=document.createElement("div"); cdiv.className="col";
      const cells=[];
      for(let r=0;r<ROWS;r++){
        const c=document.createElement("div");
        const data=col[r];
        if(!data || data.pad){ c.className="cell pad"; }
        else{
          c.className="cell l"+ (data.level||levelFromCount(data.count));
          c.dataset.count=data.count; c.dataset.date=data.date;
          c.addEventListener("mouseenter", showTip);
          c.addEventListener("mousemove", moveTip);
          c.addEventListener("mouseleave", hideTip);
        }
        cdiv.appendChild(c); cells.push(c);
      }
      gridEl.appendChild(cdiv);
      colEls.push(cells); collected.push(false);
    });

    gridW = COLS.length*PITCH - GAP;
    gridH = ROWS*PITCH - GAP;
    renderMonths(); renderDays(); sizeCanvases();
  }

  function renderMonths(){
    monthsEl.style.width=gridW+"px"; monthsEl.innerHTML="";
    let last=-1, lastCi=-99;
    COLS.forEach((col,ci)=>{
      const first=col.find(c=>c&&!c.pad&&c.date);
      if(!first) return;
      const m=new Date(first.date+"T00:00:00").getMonth();
      if(m!==last && ci-lastCi>=3 && ci < COLS.length-1){
        const s=document.createElement("span");
        s.textContent=MONTHS[m]; s.style.left=(ci*PITCH)+"px";
        monthsEl.appendChild(s); last=m; lastCi=ci;
      }
    });
  }
  function renderDays(){
    daysEl.innerHTML="";
    const labels={1:"Mon",3:"Wed",5:"Fri"};
    for(let r=0;r<ROWS;r++){
      const s=document.createElement("span");
      s.textContent=labels[r]||"";
      daysEl.appendChild(s);
    }
  }

  // ---------- tooltip ----------
  function fmtDate(iso){
    const d=new Date(iso+"T00:00:00");
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  }
  let tipCell=null;
  function showTip(e){ tipCell=e.currentTarget; const n=+tipCell.dataset.count;
    tip.innerHTML = `<b>${n}</b> contribution${n===1?"":"s"} · ${fmtDate(tipCell.dataset.date)}`;
    tip.style.opacity="1"; moveTip(e);
  }
  function moveTip(e){ tip.style.left=e.clientX+"px"; tip.style.top=(e.clientY-12)+"px"; }
  function hideTip(){ tip.style.opacity="0"; tipCell=null; }

  // ---------- canvas sizing ----------
  let DPR=Math.min(window.devicePixelRatio||1, 2);
  const FX_PAD_TOP=6, FX_PAD_BOT=30;
  let fxH=0;
  function sizeCanvases(){
    bg.style.width=gridW+"px"; bg.style.height=gridH+"px";
    bg.width=gridW*DPR; bg.height=gridH*DPR; bx.setTransform(DPR,0,0,DPR,0,0);

    fxH = gridH + FX_PAD_TOP + FX_PAD_BOT;
    fx.style.width=gridW+"px"; fx.style.height=fxH+"px";
    fx.width=gridW*DPR; fx.height=fxH*DPR; fxc.setTransform(DPR,0,0,DPR,0,0);
    initAmbient();
  }

  // ---------- leaves ----------
  const LEAF_COLORS=["#3fae54","#2f7d34","#8bc34a","#cddc39","#5fbf6a","#ffb74d"];
  function drawLeaf(ctx,x,y,size,rot,color,alpha){
    ctx.save(); ctx.translate(x,y); ctx.rotate(rot); ctx.globalAlpha=alpha;
    ctx.fillStyle=color; ctx.beginPath();
    ctx.moveTo(0,-size);
    ctx.quadraticCurveTo(size*0.95,-size*0.1, 0,size);
    ctx.quadraticCurveTo(-size*0.95,-size*0.1, 0,-size);
    ctx.fill();
    ctx.strokeStyle="rgba(0,0,0,.28)"; ctx.lineWidth=Math.max(.5,size*0.13);
    ctx.beginPath(); ctx.moveTo(0,-size*0.85); ctx.lineTo(0,size*0.85); ctx.stroke();
    ctx.restore();
  }

  // collection leaves (fx layer)
  let leaves=[];
  function spawnLeaves(cx){
    const n=3+Math.floor(Math.random()*3);
    for(let i=0;i<n;i++){
      leaves.push({
        x:cx + (Math.random()*8-4),
        y:FX_PAD_TOP + Math.random()*gridH,
        vx:18+Math.random()*32,
        vy:-26-Math.random()*30,
        rot:Math.random()*Math.PI*2,
        vr:(Math.random()*2-1)*4,
        size:3+Math.random()*3.2,
        color:LEAF_COLORS[Math.floor(Math.random()*LEAF_COLORS.length)],
        life:1.5+Math.random()*0.7, max:2.2,
        sway:Math.random()*Math.PI*2
      });
    }
  }
  function updateLeaves(dt){
    for(let i=leaves.length-1;i>=0;i--){
      const l=leaves[i];
      l.vy += 130*dt;            // gravity
      l.sway += dt*4;
      l.x += (l.vx + Math.sin(l.sway)*12)*dt;
      l.y += l.vy*dt;
      l.rot += l.vr*dt;
      l.life -= dt;
      if(l.life<=0 || l.y>fxH+10){ leaves.splice(i,1); }
    }
  }

  // ambient leaves (bg layer)
  let ambient=[];
  function initAmbient(){
    ambient=[];
    const n=7;
    for(let i=0;i<n;i++){
      ambient.push({
        x:Math.random()*gridW, y:Math.random()*gridH,
        vx:6+Math.random()*10, vy:3+Math.random()*6,
        rot:Math.random()*Math.PI*2, vr:(Math.random()*2-1)*0.5,
        size:6+Math.random()*5, sway:Math.random()*Math.PI*2,
        color:LEAF_COLORS[Math.floor(Math.random()*4)],
        alpha:0.08+Math.random()*0.09
      });
    }
  }
  function drawAmbient(dt){
    bx.clearRect(0,0,gridW,gridH);
    ambient.forEach(l=>{
      l.sway+=dt*1.2;
      l.x += (l.vx + Math.sin(l.sway)*4)*dt;
      l.y += l.vy*dt; l.rot += l.vr*dt;
      if(l.x>gridW+14){ l.x=-14; l.y=Math.random()*gridH; }
      if(l.y>gridH+14){ l.y=-14; }
      drawLeaf(bx,l.x,l.y,l.size,l.rot,l.color,l.alpha);
    });
  }

  // ---------- runner sprite ----------
  function drawRunner(ctx,x,baseY,t){
    // motion trail
    for(let g=3;g>=1;g--){
      ctx.save(); ctx.globalAlpha=0.06*g;
      runnerBody(ctx, x-g*7, baseY, t, true); ctx.restore();
    }
    runnerBody(ctx, x, baseY, t, false);
  }
  function runnerBody(ctx,x,baseY,t,ghost){
    const phase=t*11;
    const swing=Math.sin(phase);
    const bob=Math.abs(Math.cos(phase))*2;
    ctx.save();
    ctx.translate(x, baseY - bob);
    ctx.lineCap="round"; ctx.lineJoin="round";

    const body = ghost ? "#b9742e" : "#ffc266";
    const dark = ghost ? "#8f5520" : "#e09236";

    // torch glow (light source)
    if(!ghost){
      const tgx=11, tgy=-19;
      const gr=ctx.createRadialGradient(tgx,tgy,0,tgx,tgy,30);
      gr.addColorStop(0,"rgba(255,180,80,.55)");
      gr.addColorStop(1,"rgba(255,180,80,0)");
      ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(tgx,tgy,30,0,Math.PI*2); ctx.fill();
    }

    // back leg
    ctx.strokeStyle=dark; ctx.lineWidth=3.4;
    leg(ctx, 0, -10, -swing);
    // back arm
    ctx.lineWidth=3;
    arm(ctx, 0, -22, -swing*0.8);

    // torso
    ctx.strokeStyle=body; ctx.lineWidth=4.2;
    ctx.beginPath(); ctx.moveTo(-1,-9); ctx.lineTo(2,-23); ctx.stroke();

    // head
    ctx.fillStyle=body; ctx.beginPath(); ctx.arc(3,-26,3.4,0,Math.PI*2); ctx.fill();

    // front leg
    ctx.strokeStyle=body; ctx.lineWidth=3.6;
    leg(ctx, 0, -10, swing);
    // front arm + torch
    ctx.lineWidth=3.2;
    armTorch(ctx, 2, -22, swing*1.05, ghost);

    ctx.restore();
  }
  function leg(ctx, hx, hy, s){
    const knee_x=hx + s*5, knee_y=hy+7;
    const foot_x=hx + s*9 + 2, foot_y=hy + 12 - Math.max(0,-s)*3;
    ctx.beginPath(); ctx.moveTo(hx,hy); ctx.lineTo(knee_x,knee_y); ctx.lineTo(foot_x,foot_y); ctx.stroke();
  }
  function arm(ctx, sx, sy, s){
    const elx=sx + s*5, ely=sy+5;
    const hnx=sx + s*9, hny=sy+8;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(elx,ely); ctx.lineTo(hnx,hny); ctx.stroke();
  }
  function armTorch(ctx, sx, sy, s, ghost){
    const elx=sx + 5 + s*2, ely=sy+4;
    const hnx=sx + 10, hny=sy+1;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(elx,ely); ctx.lineTo(hnx,hny); ctx.stroke();
    if(ghost) return;
    // torch stick
    ctx.strokeStyle="#7a4a22"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(hnx,hny); ctx.lineTo(hnx+2,hny-7); ctx.stroke();
    // flame
    const fx0=hnx+2, fy0=hny-8;
    ctx.fillStyle="#ffcf4d";
    ctx.beginPath(); ctx.ellipse(fx0,fy0,2.4,4.2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle="#ff7a2b";
    ctx.beginPath(); ctx.ellipse(fx0,fy0+0.5,1.3,2.6,0,0,Math.PI*2); ctx.fill();
  }

  // ---------- collect / regrow ----------
  function collectCol(ci){
    if(collected[ci]) return; collected[ci]=true;
    colEls[ci].forEach(c=>{ if(!c.classList.contains("pad")) c.classList.add("eaten"); });
    spawnLeaves(ci*PITCH + CELL/2);
  }
  function regrowCol(ci){
    if(!collected[ci]) return; collected[ci]=false;
    colEls[ci].forEach(c=>c.classList.remove("eaten"));
  }

  // ---------- loop ----------
  let runnerX=-44, state="run", stateT=0, regrowI=0, prev=0, started=false;
  const SPEED=168;
  function frame(now){
    if(!prev) prev=now;
    let dt=(now-prev)/1000; prev=now; if(dt>0.05) dt=0.05;

    if(state==="run"){
      runnerX += SPEED*dt;
      for(let ci=0; ci<COLS.length; ci++){
        if(!collected[ci] && runnerX >= ci*PITCH + CELL/2) collectCol(ci);
      }
      if(runnerX > gridW + 50){ state="settle"; stateT=0; }
    } else if(state==="settle"){
      stateT+=dt; if(stateT>0.55){ state="regrow"; stateT=0; regrowI=0; }
    } else if(state==="regrow"){
      stateT+=dt;
      const target=Math.floor(stateT/0.022);
      while(regrowI<=target && regrowI<COLS.length){ regrowCol(regrowI); regrowI++; }
      if(regrowI>=COLS.length && stateT > COLS.length*0.022 + 0.5){
        state="run"; runnerX=-44;
      }
    }

    updateLeaves(dt);
    drawAmbient(dt);

    fxc.clearRect(0,0,gridW,fxH);
    // collection leaves
    for(const l of leaves) drawLeaf(fxc,l.x,l.y,l.size,l.rot,l.color, Math.min(1,l.life/0.6));
    // runner (only while crossing)
    if(state==="run"){
      const baseY = FX_PAD_TOP + gridH*0.60;
      drawRunner(fxc, runnerX, baseY, now/1000);
    }

    requestAnimationFrame(frame);
  }

  // ---------- boot ----------
  (async function(){
    const { days, live, err } = await loadDays();
    render(days);
    const total = days.reduce((s,d)=>s+(d.count||0),0);
    totalEl.textContent = total.toLocaleString();
    foot.innerHTML = live
      ? `Live from GitHub · ${days.length} days tracked · runner loops forever, hover any square for details.`
      : `<span class="err">Couldn’t reach GitHub just now — showing a sample grid.</span> Republished/hosted, it will pull @${USER}’s live data.`;
    if(!started){ started=true; requestAnimationFrame(frame); }
  })();

  window.addEventListener("resize", ()=>{
    const ndpr=Math.min(window.devicePixelRatio||1,2);
    if(ndpr!==DPR){ DPR=ndpr; sizeCanvases(); }
  });
})();
</script>
</body>
</html>
