*{margin:0;padding:0;box-sizing:border-box}
:root{
  --sand:#f3ede0;
  --ink:#1a1a1a;
  --blue:#2563eb;
  --amber:#f59e0b;
  --red:#dc2626;
  --green:#16a34a;
  --shadow:3px 3px 0 #1a1a1a;
  --shadow-sm:2px 2px 0 #1a1a1a;
  --border:1.5px solid #1a1a1a;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--sand);height:100vh;overflow:hidden;position:relative}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='0.055'/></svg>");pointer-events:none;z-index:9000}

.nav{height:48px;background:var(--sand);border-bottom:var(--border);display:flex;align-items:center;padding:0 16px;gap:18px;position:relative;z-index:100;flex-shrink:0}
.nav-logo{font-weight:800;font-size:16px;letter-spacing:-0.5px;display:flex;align-items:center;gap:8px;white-space:nowrap;color:var(--ink)}
.nav-links{display:flex;gap:2px;flex:1}
.nb{font-size:13px;font-weight:500;color:var(--ink);cursor:pointer;padding:5px 10px;border:none;border-radius:4px;background:none;font-family:'Space Grotesk',sans-serif;transition:background .12s}
.nb:hover{background:rgba(37,99,235,.08)}
.nb.on{font-weight:700;background:rgba(37,99,235,.1);color:var(--blue)}
.nav-cta{background:var(--amber);border:1.5px solid var(--ink);border-radius:4px;padding:6px 14px;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;box-shadow:var(--shadow-sm);color:var(--ink);text-decoration:none;white-space:nowrap;transition:transform .1s,box-shadow .1s}
.nav-cta:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
.nav-burger{display:none;width:36px;height:32px;border:1.5px solid var(--ink);border-radius:4px;background:#fff;cursor:pointer;align-items:center;justify-content:center;flex-direction:column;gap:4px;box-shadow:var(--shadow-sm);padding:0;flex-shrink:0}
.nav-burger span{display:block;width:18px;height:2px;background:var(--ink);border-radius:1px;transition:transform .15s,opacity .15s}
.nav-burger.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
.nav-burger.open span:nth-child(2){opacity:0}
.nav-burger.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
.mobile-drawer{display:none;position:fixed;top:48px;left:0;right:0;bottom:0;background:var(--sand);z-index:200;overflow-y:auto;padding:18px 16px 32px;border-top:var(--border)}
.mobile-drawer.open{display:block;animation:fadeIn .18s ease-out}
.md-sec-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.md-sec{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--ink);border-radius:6px;background:#fff;box-shadow:var(--shadow-sm);cursor:pointer;font-family:'Space Grotesk',sans-serif;text-align:left}
.md-sec.on{background:rgba(37,99,235,.1)}
.md-sec-ic{width:34px;height:34px;border-radius:6px;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:1px 1px 0 var(--ink)}
.md-sec-lbl{font-size:12px;font-weight:700;color:var(--ink)}
.md-divider{height:1px;background:rgba(26,26,26,.15);margin:14px 0}
.md-links{display:flex;flex-wrap:wrap;gap:8px}
.md-link{display:inline-flex;align-items:center;gap:7px;padding:8px 12px;border:1.5px solid var(--ink);border-radius:6px;background:#fff;box-shadow:var(--shadow-sm);text-decoration:none;color:var(--ink);font-size:12px;font-weight:600}

.workspace{display:flex;height:calc(100vh - 48px);overflow:hidden}

.sidebar{width:108px;border-right:var(--border);padding:10px 6px;display:flex;flex-direction:column;gap:3px;background:rgba(243,237,224,.55);flex-shrink:0;overflow-y:auto}
.sb{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 4px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;background:none;font-family:'Space Grotesk',sans-serif;transition:background .12s;width:100%}
.sb:hover{background:rgba(37,99,235,.08)}
.sb.on{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.25)}
.sb-ic{width:42px;height:42px;border-radius:8px;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:var(--shadow-sm);flex-shrink:0}
.sb-lbl{font-size:9.5px;font-weight:600;color:var(--ink);text-align:center;line-height:1.2;word-break:break-all}

.ew{flex:1;padding:14px;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.win{flex:1;border:2px solid var(--ink);border-radius:8px;box-shadow:5px 5px 0 var(--ink);display:flex;flex-direction:column;overflow:hidden;background:#fff}
.win-bar{background:#f9f7f2;border-bottom:1.5px solid var(--ink);padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.win-dots{display:flex;gap:6px}
.wd{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--ink);cursor:pointer}
.win-title{font-size:12px;font-weight:600;flex:1;text-align:center;color:#555;margin-right:50px}
.toolbar{border-bottom:1px solid #e5e0d5;padding:5px 12px;display:flex;align-items:center;gap:5px;flex-shrink:0;background:#fff;flex-wrap:nowrap;overflow:hidden}
.tb{width:24px;height:24px;border:1px solid #d4cfc7;border-radius:3px;background:#fff;cursor:pointer;font-size:11px;font-weight:700;color:#666;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;flex-shrink:0}
.tb:hover{background:#f3ede0}
.tbsep{width:1px;height:18px;background:#d4cfc7;flex-shrink:0}
.tbsel{border:1px solid #d4cfc7;border-radius:3px;padding:2px 5px;font-size:10px;background:#fff;font-family:'Space Grotesk',sans-serif;height:24px;cursor:pointer}
.tb-dl{margin-left:auto;background:var(--blue);color:#fff;border:1.5px solid var(--ink);border-radius:4px;padding:4px 11px;font-size:11px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;box-shadow:2px 2px 0 var(--ink);text-decoration:none;white-space:nowrap;flex-shrink:0}

.scr{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#d4cfc7 #f9f7f2}
.pad{padding:26px 34px}

.stitle{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:5px;color:var(--ink)}
.ssub{font-size:13px;color:#777;margin-bottom:20px}
.card{border:2px solid var(--ink);border-radius:6px;padding:18px;background:#fff;box-shadow:var(--shadow);margin-bottom:14px}
.btn-a{background:var(--amber);border:2px solid var(--ink);border-radius:5px;padding:9px 20px;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;box-shadow:var(--shadow);color:var(--ink);text-decoration:none;display:inline-block;transition:transform .1s,box-shadow .1s}
.btn-a:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.btn-w{background:#fff;border:2px solid var(--ink);border-radius:5px;padding:9px 20px;font-size:13px;font-weight:700;font-family:'Space Grotesk',sans-serif;cursor:pointer;box-shadow:var(--shadow);color:var(--ink);transition:transform .1s,box-shadow .1s}
.btn-w:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.tag{font-size:11px;font-weight:600;padding:3px 8px;border:1.5px solid var(--blue);border-radius:4px;background:#dbeafe;color:#1d4ed8}
.link-u{color:var(--ink);font-weight:600;border-bottom:1.5px solid var(--ink);text-decoration:none;font-size:13px;display:inline-flex;align-items:center;gap:4px}
.link-u:hover{color:var(--blue);border-bottom-color:var(--blue)}

.tabs-bar{display:flex;border-bottom:1.5px solid var(--ink)}
.tab{padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#888;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-1.5px;font-family:'Space Grotesk',sans-serif;transition:color .12s}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--ink);border-bottom-color:var(--blue);background:rgba(37,99,235,.04)}
.tab-pnl{border:1.5px solid var(--ink);border-top:none;border-radius:0 0 6px 6px;padding:18px 20px;background:#faf9f6}

.stat{border:2px solid var(--ink);border-radius:6px;padding:9px 14px;background:#fff;box-shadow:var(--shadow-sm);text-align:center;min-width:80px}
.stat-n{font-size:19px;font-weight:800;color:var(--blue)}
.stat-l{font-size:10px;font-weight:600;color:#888;margin-top:1px}

.badge{display:inline-flex;align-items:center;gap:7px;border:2px solid var(--ink);border-radius:6px;padding:8px 12px;background:#fef3c7;box-shadow:var(--shadow-sm);font-size:12px;font-weight:700}

.proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.proj-card{border:2px solid var(--ink);border-radius:8px;background:#fff;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .12s,box-shadow .12s}
.proj-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
.proj-img{width:100%;aspect-ratio:16/10;object-fit:cover;border-bottom:2px solid var(--ink);background:#f3ede0;display:block}
.proj-body{padding:16px 18px;display:flex;flex-direction:column;flex:1}
.proj-name{font-size:17px;font-weight:800;color:var(--ink);margin-bottom:2px}
.proj-sub{font-size:11px;font-weight:600;color:var(--blue);margin-bottom:9px}
.proj-desc{font-size:12.5px;color:#555;line-height:1.6;margin-bottom:12px;flex:1}
.proj-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
.proj-tag{font-size:10px;font-weight:600;padding:2px 7px;border:1.5px solid var(--blue);border-radius:3px;background:#dbeafe;color:#1d4ed8}
.proj-cta{display:flex;gap:8px}
.proj-cta a{font-size:11px;padding:6px 12px;border-radius:4px;border:1.5px solid var(--ink);font-weight:700;text-decoration:none;color:var(--ink);box-shadow:2px 2px 0 var(--ink);transition:transform .1s,box-shadow .1s}
.proj-cta a:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink)}
.proj-cta .live{background:var(--amber)}
.proj-cta .gh{background:#fff}

.rpanel{width:152px;border-left:var(--border);padding:12px 7px;display:flex;flex-direction:column;gap:4px;background:rgba(243,237,224,.4);flex-shrink:0;overflow-y:auto}
.rp{display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;border-radius:6px;cursor:pointer;border:1.5px solid transparent;text-decoration:none;transition:background .12s}
.rp:hover{background:rgba(37,99,235,.08);border-color:rgba(37,99,235,.15)}
.rp-ic{width:44px;height:44px;border:2px solid var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#fff;box-shadow:var(--shadow-sm)}
.rp-lbl{font-size:10px;font-weight:600;color:var(--ink);text-align:center}
.rp-div{height:1px;background:rgba(26,26,26,.14);margin:3px 0}

/* Section transition */
.scr-content{animation:fadeIn .22s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Keyboard focus rings */
button:focus-visible,a:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:4px}

/* Tablet ≤1024px */
@media (max-width:1024px){
  .sidebar{width:78px}
  .sb-lbl{font-size:8.5px}
  .rpanel{width:120px}
  .proj-grid{grid-template-columns:1fr}
}

/* Mobile ≤640px */
@media (max-width:640px){
  body{overflow-y:auto;height:auto}
  .workspace{flex-direction:column;height:auto;min-height:calc(100vh - 48px)}
  .sidebar,.rpanel{display:none}
  .nav{padding:0 12px;gap:10px;justify-content:space-between}
  .nav-logo{font-size:15px}
  .nav-links{display:none}
  .nav-burger{display:flex}
  .nav-cta{padding:5px 10px;font-size:12px}
  .ew{padding:8px}
  .win{box-shadow:3px 3px 0 var(--ink)}
  .pad{padding:18px 16px}
  .stitle{font-size:19px}
  .toolbar{display:none}
  h1{font-size:22px !important;line-height:1.18 !important}
  .home-hero{flex-direction:column-reverse !important;gap:14px !important;align-items:flex-start !important;margin-bottom:18px !important}
  .home-memoji > div{width:88px !important;height:88px !important;box-shadow:3px 3px 0 #f59e0b !important}
  .about-grid{flex-direction:column !important;gap:18px !important}
  .about-photo{width:100% !important;max-width:240px !important;position:static !important;align-self:center !important}
  .contact-grid{grid-template-columns:1fr !important}
  .stat{min-width:0;flex:1 1 calc(50% - 5px)}
  .tabs-bar{overflow-x:auto;flex-wrap:nowrap}
  .tab{white-space:nowrap;flex-shrink:0}
  .proj-grid{grid-template-columns:1fr}
  .win-title{margin-right:0;font-size:11px}
}
</style>

      <div className="contact-grid" style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12,maxWidth:500,marginBottom:22}}>
        {[
          {ic:'📧',l:'Email',v:EMAIL,h:`mailto:${EMAIL}`},
          {ic:Icon.github(24),l:'GitHub',v:'github.com/manik3160',h:GITHUB},
          {ic:Icon.linkedin(24),l:'LinkedIn',v:'linkedin.com/in/manik',h:LINKEDIN},
          {ic:Icon.leetcode(24),l:'LeetCode',v:'leetcode.com/manik',h:LEETCODE},
        ].map(c=>(
          <a key={c.l} href={c.h} target="_blank" rel="noreferrer" className="card" style={{display:'flex',alignItems:'center',gap:12,textDecoration:'none',color:'#1a1a1a',marginBottom:0,transition:'transform .1s,box-shadow .1s'}}
             onMouseEnter={e=>{e.currentTarget.style.transform='translate(-2px,-2px)';e.currentTarget.style.boxShadow='5px 5px 0 #1a1a1a'}}
             onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow='3px 3px 0 #1a1a1a'}}>
            <span style={{fontSize:24,flexShrink:0}}>{c.ic}</span>
            <div><div style={{fontSize:13,fontWeight:700}}>{c.l}</div><div style={{fontSize:11,color:'#999',marginTop:1}}>{c.v}</div></div>
          </a>
        ))}
      </div>
      <div style={{padding:'14px 16px',border:'2px dashed #1a1a1a',borderRadius:6,background:'#fef3c7',maxWidth:500,display:'flex',gap:10,alignItems:'center'}}>
        <span style={{fontSize:20}}>📍</span>
        <div>
          <div style={{fontSize:13,fontWeight:700}}>Available for remote opportunities</div>
          <div style={{fontSize:12,color:'#777',marginTop:2}}>Based in Sonepat, India. Open to remote internships and global roles.</div>
        </div>
      </div>
    </div>
  );
}

function RightPanel({set}) {
  const links = [
    {ic:Icon.github(24), l:'GitHub',       h:GITHUB},
    {ic:Icon.linkedin(24), l:'LinkedIn',     h:LINKEDIN},
    {ic:Icon.leetcode(24), l:'LeetCode',     h:LEETCODE},
    {ic:'📧', l:'Email Me',     h:`mailto:${EMAIL}`},
    {ic:'🏆', l:'Achievements', h:null, fn:()=>set('about')},
    {ic:'📄', l:'Download CV',  h:'https://drive.google.com/file/d/1S67rMrO1mPGnBL2YTUTfmqElumFKu_l7/view?usp=drive_link'},
  ];
  return (
    <aside className="rpanel">
      {links.map(({ic,l,h,fn,title})=>(
        <a key={l} href={h||'#'} title={title}
           target={h&&!h.startsWith('mailto')&&h!=='#'?'_blank':undefined}
           rel={h&&!h.startsWith('mailto')&&h!=='#'?'noreferrer':undefined}
           onClick={fn||undefined} className="rp">
          <div className="rp-ic">{ic}</div>
          <span className="rp-lbl">{l}</span>
        </a>
      ))}
      <div className="rp-div"/>
      <IsoScene/>
    </aside>
  );
}

const FILES = {home:'home.mdx',about:'about.mdx',proj:'projects/index.mdx',skills:'skills.mdx',exp:'experience.mdx',contact:'contact.mdx'};

function App() {
  const validSections = ['home','about','proj','skills','exp','contact'];
  const hashSection = window.location.hash.replace('#','');
  const [s, setS] = useState(validSections.includes(hashSection) ? hashSection : 'home');
  const set = (sec) => { setS(sec); window.location.hash = sec; };
  const content = {
    home:<Home set={set}/>,
    about:<About/>,
    proj:<Projects/>,
    skills:<SkillsPage/>,
    exp:<Exp/>,
    contact:<Contact/>,
  };
  return (
    <div style={{fontFamily:"'Space Grotesk',sans-serif",height:'100vh',display:'flex',flexDirection:'column'}}>
      <Nav s={s} set={set}/>
      <div className="workspace">
        <Sidebar s={s} set={set}/>
        <div className="ew">
          <div className="win">
            <WinBar title={FILES[s]}/>
            <Toolbar/>
            <div className="scr"><div className="scr-content" key={s}>{content[s]}</div></div>
            <footer style={{textAlign:'center',padding:'10px 14px',fontSize:11,color:'#888',borderTop:'1px solid rgba(0,0,0,0.06)',background:'#faf9f6',flexShrink:0}}>
              © 2026 Manik · Built with <span style={{color:'#f59e0b'}}>♥</span> · <a href="https://github.com/manik3160/new" target="_blank" rel="noreferrer" style={{color:'#555',borderBottom:'1px dotted #aaa',textDecoration:'none'}}>Source</a>
            </footer>
          </div>
        </div>
        <RightPanel set={set}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
